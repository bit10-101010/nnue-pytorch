name: Auto Resolve PR Conflicts

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git fetch origin
          git merge origin/${{ github.base_ref }} -X ours || true

          git add .
          git commit -m "Auto resolve conflicts" || echo "No conflicts"

          git push
